# 1. Cấu hình thông tin kết nối SQL Server
# LƯU Ý: instanceName=MAY1 thay vì port mặc định, và bật trustServerCertificate để tránh lỗi SSL
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DressRentalDB;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. Cấu hình Hibernate (Công cụ ánh xạ CSDL của Spring)
# 'update': Tự động cập nhật cấu trúc bảng khi có thay đổi (rất hữu ích khi thiếu cột)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Hiển thị câu lệnh SQL thực tế trên Terminal để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Khai báo loại cơ sở dữ liệu để Spring tối ưu câu lệnh
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Cau hinh tai khoan dang nhap mac dinh cho Spring Security
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
